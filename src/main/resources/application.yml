spring:
  application:
    name: ticket-booking-system

  datasource:
    url: jdbc:mysql://localhost:3306/ticket_booking
    username: ticket_booking
    password: ticket_booking
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    # Flyway is the only source of schema truth. If an entity mapping drifts
    # from the migrations, the app fails fast at boot instead of Hibernate
    # silently altering the schema.
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

app:
  booking:
    # Which BookingService implementation backs POST /api/bookings.
    # One of: naive, pessimistic, optimistic, redis-lock, redis-counter.
    # Benchmarking a strategy means setting this and restarting the app
    # before running k6.
    strategy: pessimistic
  metrics:
    # Which event the booking.oversold gauge continuously reports on. The
    # seed migration creates exactly one event, so this defaults to its id.
    tracked-event-id: 1

management:
  endpoints:
    web:
      exposure:
        # Only health and prometheus -- least exposure needed for Phase 7's
        # scraping, not the full actuator surface.
        include: health,prometheus
  metrics:
    tags:
      application: ${spring.application.name}